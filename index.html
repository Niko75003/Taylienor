<!doctype html>
<html lang="fr" data-theme="soft-summer">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aliénor’s Swiftie Experience</title><link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
<button id="burgerBtn" class="burger-btn" aria-label="Ouvrir le menu" aria-expanded="false"><span></span><span></span><span></span></button>
<button class="brand" data-route="home"><span class="brand-taylor">Taylor</span><small>ALIÉNOR’S SWIFTIE EXPERIENCE</small></button>
<nav><button data-route="home">Accueil</button><button data-route="rank">Rank</button><button data-route="blindtest">Blindtest</button><button data-route="quiz">Quiz</button></nav>
<button id="themeBtn" class="theme-menu-dot" aria-label="Changer la saison" title="Changer la saison"><span></span></button>
</header>
<div id="mobileMenuBackdrop" class="mobile-menu-backdrop"></div>
<aside id="mobileMenu" class="mobile-menu" aria-hidden="true">
  <div class="mobile-menu-head">
    <b>Aliénor’s Swiftie Experience</b>
    <button id="mobileMenuClose" aria-label="Fermer le menu">×</button>
  </div>
  <div class="mobile-menu-links">
    <button data-mobile-route="rank">♡ Rank</button>
    <button data-mobile-route="blindtest">♫ Guess</button>
    <button data-mobile-route="quiz">? Quiz</button>
  </div>
  <p class="mobile-menu-label">Gamme colorée</p>
  <div class="mobile-theme-list">
    <button data-mobile-theme="soft-summer"><span class="summer"></span>Été</button>
    <button data-mobile-theme="soft-autumn"><span class="autumn"></span>Automne</button>
    <button data-mobile-theme="winter"><span class="winter"></span>Hiver</button>
    <button data-mobile-theme="spring"><span class="spring"></span>Printemps</button>
  </div><div class="mobile-sync"><p id="syncStatus">Synchronisation inactive</p><button id="syncNowBtn">Synchroniser maintenant</button><button id="logoutBtn">Se déconnecter</button></div></aside>

    <main id="app"></main><div id="authSplash" class="auth-splash" hidden><section class="auth-card"><div class="auth-mark">Taylor</div><p class="eyebrow">Aliénor’s Swiftie Experience</p><h1>Bienvenue, Aliénor ♡</h1><p>Connecte-toi pour retrouver tes notes et tes meilleurs scores sur tous tes appareils.</p><form id="loginForm"><label>Adresse e-mail<input id="loginEmail" type="email" autocomplete="email" required></label><label>Mot de passe<input id="loginPassword" type="password" autocomplete="current-password" required></label><button class="primary" type="submit">Se connecter</button><button class="auth-link" type="button" id="forgotPassword">Mot de passe oublié</button><p id="authMessage" class="auth-message" aria-live="polite"></p></form></section></div>
<dialog id="themeDialog"><button class="close">×</button><h2>Quelle est ton humeur, Aliénor ?</h2>
<div class="themes"><button data-theme="soft-summer">Été</button><button data-theme="soft-autumn">Automne</button><button data-theme="winter">Hiver</button><button data-theme="spring">Printemps</button></div></dialog>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="data.js"></script><script src="quiz-data.js"></script><script src="app.js"></script>
</body></html>
